<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="760" height="360" fill="#fff"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.08em">JAPAN B2B BUYER EVALUATION MODEL</text>

  <!-- Lines from center to boxes (drawn before shapes so they appear behind) -->
  <!-- Top: center(380,180) to box center(380,68) -->
  <line x1="380" y1="128" x2="380" y2="90" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Top-right: to (590,112) -->
  <line x1="426" y1="154" x2="520" y2="112" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Bottom-right: to (590,248) -->
  <line x1="426" y1="206" x2="520" y2="248" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Bottom: to (380,292) -->
  <line x1="380" y1="232" x2="380" y2="270" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Bottom-left: to (170,248) -->
  <line x1="334" y1="206" x2="240" y2="248" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Top-left: to (170,112) -->
  <line x1="334" y1="154" x2="240" y2="112" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- Center circle -->
  <circle cx="380" cy="180" r="52" fill="#1e40af"/>
  <text x="380" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Japan B2B</text>
  <text x="380" y="191" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Buyer</text>

  <!-- Top box: Trust Formation -->
  <rect x="310" y="46" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Trust Formation</text>

  <!-- Top-right box: Risk Reduction -->
  <rect x="520" y="90" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="590" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Risk Reduction</text>

  <!-- Bottom-right box: Vendor Credibility -->
  <rect x="520" y="248" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="590" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Vendor Credibility</text>

  <!-- Bottom box: Proof & Reassurance -->
  <rect x="310" y="270" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="296" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Proof &amp; Reassurance</text>

  <!-- Bottom-left box: Internal Consensus -->
  <rect x="100" y="248" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Internal Consensus</text>

  <!-- Top-left box: Long-term Support -->
  <rect x="100" y="90" width="140" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Long-term Support</text>

  <!-- Caption bar -->
  <rect x="20" y="328" width="720" height="22" rx="4" fill="#eff6ff"/>
  <text x="380" y="343" text-anchor="middle" font-size="10" fill="#475569">Japan buyers evaluate vendors on all six dimensions before committing — messaging that addresses only one or two will stall.</text>

</svg>
