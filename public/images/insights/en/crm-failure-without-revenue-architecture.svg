<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="Why CRM Implementation Fails Without Revenue Architecture">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e40af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="260" fill="#f8fafc"/>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.07em">WHY CRM IMPLEMENTATION FAILS WITHOUT REVENUE ARCHITECTURE</text>

  <!-- LEFT panel -->
  <rect x="20" y="44" width="340" height="176" rx="8" fill="#fff7ed" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="20" y="44" width="340" height="34" rx="8" fill="#f59e0b"/>
  <rect x="20" y="66" width="340" height="12" fill="#f59e0b"/>
  <text x="190" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CRM-FIRST APPROACH</text>

  <!-- Left items -->
  <circle cx="48" cy="102" r="7" fill="#f59e0b"/>
  <text x="64" y="106" font-size="10.5" fill="#374151">No lifecycle stage definitions</text>

  <circle cx="48" cy="130" r="7" fill="#f59e0b"/>
  <text x="64" y="134" font-size="10.5" fill="#374151">No handoff criteria decided</text>

  <circle cx="48" cy="158" r="7" fill="#f59e0b"/>
  <text x="64" y="162" font-size="10.5" fill="#374151">No qualification logic</text>

  <circle cx="48" cy="186" r="7" fill="#f59e0b"/>
  <text x="64" y="190" font-size="10.5" fill="#374151">No reporting structure</text>

  <!-- VS circle -->
  <circle cx="380" cy="132" r="22" fill="#0f172a"/>
  <text x="380" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">vs</text>

  <!-- RIGHT panel -->
  <rect x="400" y="44" width="340" height="176" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="400" y="44" width="340" height="34" rx="8" fill="#1e40af"/>
  <rect x="400" y="66" width="340" height="12" fill="#1e40af"/>
  <text x="570" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">REVENUE ARCHITECTURE FIRST</text>

  <!-- Right items -->
  <circle cx="422" cy="102" r="7" fill="#1e40af"/>
  <text x="438" y="106" font-size="10.5" fill="#1e293b">Stages defined before build</text>

  <circle cx="422" cy="130" r="7" fill="#1e40af"/>
  <text x="438" y="134" font-size="10.5" fill="#1e293b">Handoff rules documented</text>

  <circle cx="422" cy="158" r="7" fill="#1e40af"/>
  <text x="438" y="162" font-size="10.5" fill="#1e293b">Qualification criteria set</text>

  <circle cx="422" cy="186" r="7" fill="#1e40af"/>
  <text x="438" y="190" font-size="10.5" fill="#1e293b">Reporting designed upfront</text>

  <!-- Caption bar -->
  <rect x="0" y="232" width="760" height="28" fill="#1e40af"/>
  <text x="380" y="250" text-anchor="middle" font-size="10" fill="#fff">CRM tools surface data. Revenue architecture defines what data to capture and what it means.</text>
</svg>
