<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="760" height="340" fill="#fff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.08em">JAPAN ENTRY READINESS CHECKLIST</text>

  <!-- Table header -->
  <rect x="20" y="40" width="720" height="32" rx="4" fill="#1e40af"/>
  <text x="44" y="61" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.04em">AREA</text>
  <text x="230" y="61" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.04em">WHAT TO PREPARE</text>

  <!-- Row 1 - white bg -->
  <rect x="20" y="72" width="720" height="34" fill="#fff"/>
  <circle cx="36" cy="89" r="5" fill="#1e40af"/>
  <text x="50" y="93" font-size="11" font-weight="600" fill="#1e40af">ICP Assumptions</text>
  <text x="230" y="93" font-size="11" fill="#475569">Who is the Japan buyer? Which roles approve?</text>

  <!-- Row 2 - light bg -->
  <rect x="20" y="106" width="720" height="34" fill="#f8fafc"/>
  <circle cx="36" cy="123" r="5" fill="#1e40af"/>
  <text x="50" y="127" font-size="11" font-weight="600" fill="#1e40af">Buyer Expectations</text>
  <text x="230" y="127" font-size="11" fill="#475569">How do they evaluate? What reduces risk?</text>

  <!-- Row 3 - white bg -->
  <rect x="20" y="140" width="720" height="34" fill="#fff"/>
  <circle cx="36" cy="157" r="5" fill="#1e40af"/>
  <text x="50" y="161" font-size="11" font-weight="600" fill="#1e40af">Messaging</text>
  <text x="230" y="161" font-size="11" fill="#475569">Is the offer framed for Japan's evaluation criteria?</text>

  <!-- Row 4 - light bg -->
  <rect x="20" y="174" width="720" height="34" fill="#f8fafc"/>
  <circle cx="36" cy="191" r="5" fill="#1e40af"/>
  <text x="50" y="195" font-size="11" font-weight="600" fill="#1e40af">Proof Points</text>
  <text x="230" y="195" font-size="11" fill="#475569">Do you have Japan-relevant references or case studies?</text>

  <!-- Row 5 - white bg -->
  <rect x="20" y="208" width="720" height="34" fill="#fff"/>
  <circle cx="36" cy="225" r="5" fill="#1e40af"/>
  <text x="50" y="229" font-size="11" font-weight="600" fill="#1e40af">Partner &amp; Sales Motion</text>
  <text x="230" y="229" font-size="11" fill="#475569">How will you reach Japan buyers — inbound, outbound, or partner?</text>

  <!-- Row 6 - light bg -->
  <rect x="20" y="242" width="720" height="34" fill="#f8fafc"/>
  <circle cx="36" cy="259" r="5" fill="#1e40af"/>
  <text x="50" y="263" font-size="11" font-weight="600" fill="#1e40af">CRM Readiness</text>
  <text x="230" y="263" font-size="11" fill="#475569">Can you track Japan-facing pipeline accurately?</text>

  <!-- Row 7 - white bg -->
  <rect x="20" y="276" width="720" height="34" fill="#fff"/>
  <circle cx="36" cy="293" r="5" fill="#1e40af"/>
  <text x="50" y="297" font-size="11" font-weight="600" fill="#1e40af">Budget &amp; Timeline</text>
  <text x="230" y="297" font-size="11" fill="#475569">Is the investment realistic for Japan's longer cycle?</text>

  <!-- Table border -->
  <rect x="20" y="40" width="720" height="270" rx="4" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Column divider -->
  <line x1="210" y1="40" x2="210" y2="310" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Caption bar -->
  <rect x="20" y="316" width="720" height="16" rx="4" fill="#eff6ff"/>
  <text x="380" y="328" text-anchor="middle" font-size="10" fill="#475569">Japan entry without this preparation creates gaps that are expensive to close after launch.</text>

</svg>
