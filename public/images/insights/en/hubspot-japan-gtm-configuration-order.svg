<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 370" role="img" aria-label="HubSpot configuration order for Japan GTM: 6 steps from lifecycle stage definitions to Japan reporting dashboard">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e40af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="370" fill="#fff"/>

  <!-- Title -->
  <text x="380" y="28" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.07em" text-anchor="middle">HUBSPOT CONFIGURATION ORDER FOR JAPAN GTM</text>

  <!-- Step 1: Lifecycle Stage Definitions (y=44, cy=64) -->
  <rect x="170" y="44" width="440" height="40" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="182" cy="64" r="16" fill="#1e40af"/>
  <text x="182" y="69" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="210" y="69" font-size="12" font-weight="600" fill="#1e40af">Lifecycle Stage Definitions</text>

  <!-- Connector 1→2 -->
  <line x1="390" y1="84" x2="390" y2="94" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Lead Source Properties (y=94, cy=114) -->
  <rect x="170" y="94" width="440" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="182" cy="114" r="16" fill="#1e40af"/>
  <text x="182" y="119" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="210" y="119" font-size="12" font-weight="600" fill="#334155">Lead Source Properties</text>

  <!-- Connector 2→3 -->
  <line x1="390" y1="134" x2="390" y2="144" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Japan Qualification Properties (y=144, cy=164) -->
  <rect x="170" y="144" width="440" height="40" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="182" cy="164" r="16" fill="#1e40af"/>
  <text x="182" y="169" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="210" y="169" font-size="12" font-weight="600" fill="#1e40af">Japan Qualification Properties</text>

  <!-- Connector 3→4 -->
  <line x1="390" y1="184" x2="390" y2="194" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Pipeline Stages (y=194, cy=214) -->
  <rect x="170" y="194" width="440" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="182" cy="214" r="16" fill="#1e40af"/>
  <text x="182" y="219" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="210" y="219" font-size="12" font-weight="600" fill="#334155">Pipeline Stages</text>

  <!-- Connector 4→5 -->
  <line x1="390" y1="234" x2="390" y2="244" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Handoff Workflows (y=244, cy=264) -->
  <rect x="170" y="244" width="440" height="40" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="182" cy="264" r="16" fill="#1e40af"/>
  <text x="182" y="269" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="210" y="269" font-size="12" font-weight="600" fill="#1e40af">Handoff Workflows</text>

  <!-- Connector 5→6 -->
  <line x1="390" y1="284" x2="390" y2="294" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Japan Reporting Dashboard (y=294, cy=314) -->
  <rect x="170" y="294" width="440" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="182" cy="314" r="16" fill="#1e40af"/>
  <text x="182" y="319" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="210" y="319" font-size="12" font-weight="600" fill="#334155">Japan Reporting Dashboard</text>

  <!-- Caption bar -->
  <rect x="0" y="350" width="760" height="20" fill="#f1f5f9"/>
  <text x="380" y="364" font-size="10" fill="#64748b" text-anchor="middle">Configuration order matters — each layer depends on the one before it.</text>
</svg>
