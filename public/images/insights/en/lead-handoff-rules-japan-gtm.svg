<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" role="img" aria-label="Lead Handoff Rules for Japan GTM Teams">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e40af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="230" fill="#f8fafc"/>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.07em">LEAD HANDOFF RULES FOR JAPAN GTM TEAMS</text>

  <!-- LEFT BOX: MARKETING -->
  <rect x="20" y="44" width="190" height="140" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="44" width="190" height="34" rx="8" fill="#1e40af"/>
  <rect x="20" y="66" width="190" height="12" fill="#1e40af"/>
  <text x="115" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MARKETING</text>
  <!-- Body -->
  <text x="115" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Stage: MQL</text>
  <text x="115" y="122" text-anchor="middle" font-size="11" fill="#475569">Lead captured</text>

  <!-- Arrow marketing → criteria -->
  <line x1="210" y1="114" x2="248" y2="114" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CENTER BOX: HANDOFF CRITERIA -->
  <rect x="250" y="44" width="260" height="140" rx="8" fill="#fff7ed" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="250" y="44" width="260" height="34" rx="8" fill="#f59e0b"/>
  <rect x="250" y="66" width="260" height="12" fill="#f59e0b"/>
  <text x="380" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">HANDOFF CRITERIA</text>
  <!-- Criteria list -->
  <circle cx="268" cy="96" r="3" fill="#f59e0b"/>
  <text x="278" y="100" font-size="10" fill="#475569">Fits ICP definition</text>

  <circle cx="268" cy="112" r="3" fill="#f59e0b"/>
  <text x="278" y="116" font-size="10" fill="#475569">Has engaged with content</text>

  <circle cx="268" cy="128" r="3" fill="#f59e0b"/>
  <text x="278" y="132" font-size="10" fill="#475569">Japan-relevant intent signal</text>

  <circle cx="268" cy="144" r="3" fill="#f59e0b"/>
  <text x="278" y="148" font-size="10" fill="#475569">Decision-maker confirmed</text>

  <circle cx="268" cy="160" r="3" fill="#f59e0b"/>
  <text x="278" y="164" font-size="10" fill="#475569">No disqualifying factors</text>

  <!-- Arrow criteria → sales -->
  <line x1="510" y1="114" x2="538" y2="114" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT BOX: SALES -->
  <rect x="540" y="44" width="200" height="140" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="540" y="44" width="200" height="34" rx="8" fill="#1e40af"/>
  <rect x="540" y="66" width="200" height="12" fill="#1e40af"/>
  <text x="640" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SALES</text>
  <!-- Body -->
  <text x="640" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Stage: SQL</text>
  <text x="640" y="122" text-anchor="middle" font-size="11" fill="#475569">Lead accepted</text>

  <!-- Caption bar -->
  <rect x="0" y="196" width="760" height="28" fill="#1e40af"/>
  <text x="380" y="214" text-anchor="middle" font-size="10" fill="#fff">Without documented handoff criteria, ownership is ambiguous and leads stall between marketing and sales.</text>
</svg>
