  <text x="615" y="79" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.06em" fill="#ffffff">EVALUATION</text>

  <!-- Items -->
  <circle cx="527" cy="107" r="3.5" fill="#1e40af"/>
  <text x="539" y="111" font-size="11.5" font-weight="500" fill="#1e3a8a">Trust</text>

  <circle cx="527" cy="133" r="3.5" fill="#1e40af"/>
  <text x="539" y="137" font-size="11.5" font-weight="500" fill="#1e3a8a">Risk reduction</text>

  <circle cx="527" cy="159" r="3.5" fill="#1e40af"/>
  <text x="539" y="163" font-size="11.5" font-weight="500" fill="#1e3a8a">Internal consensus</text>

  <circle cx="527" cy="185" r="3.5" fill="#1e40af"/>
  <text x="539" y="189" font-size="11.5" font-weight="500" fill="#1e3a8a">Vendor stability</text>

  <circle cx="527" cy="211" r="3.5" fill="#1e40af"/>
  <text x="539" y="215" font-size="11.5" font-weight="500" fill="#1e3a8a">Operational fit</text>


  <!-- ══════════════════════════════════
       CAPTION BAR
       ══════════════════════════════════ -->
  <rect x="35" y="248" width="690" height="36" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="270" text-anchor="middle" font-size="12" fill="#334155">Japan-ready messaging must translate value into the way local buyers evaluate decisions.</text>
