  </defs>

  <!-- Background -->
  <rect width="760" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="0.07em" fill="#64748b">WHY GLOBAL MESSAGING LOSES POWER IN JAPAN</text>

  <!-- ══════════════════════════════════
       LEFT CARD: Global Message
       x=35, y=46, w=206, h=158
       ══════════════════════════════════ -->
  <rect x="35" y="46" width="206" height="158" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Header background -->
  <rect x="35" y="46" width="206" height="44" rx="10" fill="#e2e8f0"/>
  <rect x="35" y="80"  width="206" height="10"  fill="#e2e8f0"/>
  <!-- Header text -->
  <text x="138" y="72" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.07em" fill="#334155">GLOBAL MESSAGE</text>

  <!-- Items -->
  <circle cx="58" cy="107" r="3.5" fill="#94a3b8"/>
  <text x="70" y="111" font-size="11.5" fill="#475569">Speed</text>

  <circle cx="58" cy="133" r="3.5" fill="#94a3b8"/>
  <text x="70" y="137" font-size="11.5" fill="#475569">Scale</text>

  <circle cx="58" cy="159" r="3.5" fill="#94a3b8"/>
  <text x="70" y="163" font-size="11.5" fill="#475569">Innovation</text>

  <circle cx="58" cy="185" r="3.5" fill="#94a3b8"/>
  <text x="70" y="189" font-size="11.5" fill="#475569">Feature value</text>


  <!-- ══════════════════════════════════
       ARROW 1: Left → Middle
       ══════════════════════════════════ -->
  <line x1="241" y1="125" x2="283" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>


  <!-- ══════════════════════════════════
