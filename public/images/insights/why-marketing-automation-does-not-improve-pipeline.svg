  <text x="84" y="74" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="20" font-weight="500" fill="#93C5FD" letter-spacing="0.28em">INSIGHTS</text>

  <text x="84" y="271" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',system-ui,sans-serif" font-size="64" font-weight="600" fill="#FAFAF9" letter-spacing="0.01em">MAを導入しても商談化率が改善</text>
  <text x="84" y="364" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',system-ui,sans-serif" font-size="64" font-weight="600" fill="#FAFAF9" letter-spacing="0.01em">しない理由</text>
  

  <rect x="0" y="544" width="1200" height="86" fill="#FAFAF9" fill-opacity="0.045"/>
  <line x1="0" y1="544" x2="1200" y2="544" stroke="#FAFAF9" stroke-opacity="0.14" stroke-width="1"/>
  <text x="84" y="597" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="600" fill="#FAFAF9" fill-opacity="0.85" letter-spacing="0.18em">CONSILEGY</text>
  <text x="1116" y="597" text-anchor="end" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="18" font-weight="400" fill="#FAFAF9" fill-opacity="0.4" letter-spacing="0.06em">consilegy.com</text>
