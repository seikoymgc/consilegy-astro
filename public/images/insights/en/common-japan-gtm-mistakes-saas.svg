<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="760" height="310" fill="#fff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.08em">COMMON JAPAN GTM MISTAKES FOR B2B SaaS</text>

  <!-- Item 1 y=70 -->
  <rect x="30" y="55" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="67" font-size="12" font-weight="700" fill="#92400e">Treating Japan as another English-speaking market</text>
  <text x="60" y="81" font-size="11" fill="#475569">Global positioning and urgency messaging applied without adaptation.</text>

  <!-- Item 2 y=106 -->
  <rect x="30" y="91" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="103" font-size="12" font-weight="700" fill="#92400e">Translating the website only</text>
  <text x="60" y="117" font-size="11" fill="#475569">Language is changed, but buyer logic and trust signals remain wrong.</text>

  <!-- Item 3 y=142 -->
  <rect x="30" y="127" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="139" font-size="12" font-weight="700" fill="#92400e">Hiring sales before funnel design</text>
  <text x="60" y="153" font-size="11" fill="#475569">Sales hire arrives with no positioning, ICP, or CRM structure.</text>

  <!-- Item 4 y=178 -->
  <rect x="30" y="163" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="175" font-size="12" font-weight="700" fill="#92400e">Relying on weak proof points</text>
  <text x="60" y="189" font-size="11" fill="#475569">Global logos and analyst reports don't reduce Japan buyers' internal risk.</text>

  <!-- Item 5 y=214 -->
  <rect x="30" y="199" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="211" font-size="12" font-weight="700" fill="#92400e">No clear handoff rules</text>
  <text x="60" y="225" font-size="11" fill="#475569">Leads fall between marketing and sales without clear ownership.</text>

  <!-- Item 6 y=250 -->
  <rect x="30" y="235" width="14" height="14" rx="2" fill="#f59e0b"/>
  <text x="60" y="247" font-size="12" font-weight="700" fill="#92400e">CRM not adapted for Japan</text>
  <text x="60" y="261" font-size="11" fill="#475569">Western funnel stages produce inaccurate Japan pipeline data.</text>

  <!-- Caption bar -->
  <rect x="20" y="275" width="720" height="24" rx="4" fill="#eff6ff"/>
  <text x="380" y="291" text-anchor="middle" font-size="10" fill="#475569">Each of these mistakes has a specific fix — and most are design decisions, not execution decisions.</text>

</svg>
