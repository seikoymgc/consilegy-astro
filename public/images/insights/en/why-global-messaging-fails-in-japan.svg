       x=285, y=46, w=186, h=158
       ══════════════════════════════════ -->
  <rect x="285" y="46" width="186" height="158" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <!-- Header background -->
  <rect x="285" y="46" width="186" height="44" rx="10" fill="#fef08a"/>
  <rect x="285" y="80"  width="186" height="10"  fill="#fef08a"/>
  <!-- Header text -->
  <text x="378" y="72" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.07em" fill="#78350f">MISMATCH</text>

  <!-- Items (diamond bullet) -->
  <rect x="302" y="103" width="6" height="6" rx="1" transform="rotate(45 305 106)" fill="#f59e0b"/>
  <text x="318" y="111" font-size="11.5" fill="#92400e">Trust gap</text>

  <rect x="302" y="129" width="6" height="6" rx="1" transform="rotate(45 305 132)" fill="#f59e0b"/>
  <text x="318" y="137" font-size="11.5" fill="#92400e">Risk gap</text>

  <rect x="302" y="155" width="6" height="6" rx="1" transform="rotate(45 305 158)" fill="#f59e0b"/>
  <text x="318" y="163" font-size="11.5" fill="#92400e">Proof gap</text>

  <rect x="302" y="181" width="6" height="6" rx="1" transform="rotate(45 305 184)" fill="#f59e0b"/>
