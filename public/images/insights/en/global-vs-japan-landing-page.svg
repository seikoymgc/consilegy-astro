<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="760" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" letter-spacing="0.07em">GLOBAL LANDING PAGE vs JAPAN-READY LANDING PAGE</text>

  <!-- Left panel -->
  <rect x="20" y="46" width="340" height="310" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Left header -->
  <rect x="20" y="46" width="340" height="38" rx="10" fill="#e2e8f0"/>
  <rect x="20" y="64" width="340" height="20" fill="#e2e8f0"/>
  <text x="190" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#334155" letter-spacing="0.05em">GLOBAL LANDING PAGE</text>

  <!-- Left items -->
  <circle cx="40" cy="106" r="4" fill="#94a3b8"/>
  <text x="52" y="110" font-size="11" fill="#475569">Feature-first headline</text>

  <circle cx="40" cy="130" r="4" fill="#94a3b8"/>
  <text x="52" y="134" font-size="11" fill="#475569">Global customer logos</text>

  <circle cx="40" cy="154" r="4" fill="#94a3b8"/>
  <text x="52" y="158" font-size="11" fill="#475569">ROI-focused value prop</text>

  <circle cx="40" cy="178" r="4" fill="#94a3b8"/>
  <text x="52" y="182" font-size="11" fill="#475569">Abstract outcome claims</text>

  <circle cx="40" cy="202" r="4" fill="#94a3b8"/>
  <text x="52" y="206" font-size="11" fill="#475569">Urgency CTA: "Book a demo"</text>

  <circle cx="40" cy="226" r="4" fill="#94a3b8"/>
  <text x="52" y="230" font-size="11" fill="#475569">No Japan references</text>

  <circle cx="40" cy="250" r="4" fill="#94a3b8"/>
  <text x="52" y="254" font-size="11" fill="#475569">No FAQ or support info</text>

  <!-- Right panel -->
  <rect x="400" y="46" width="340" height="310" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <!-- Right header -->
  <rect x="400" y="46" width="340" height="38" rx="10" fill="#1e40af"/>
  <rect x="400" y="64" width="340" height="20" fill="#1e40af"/>
  <text x="570" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.05em">JAPAN-READY LANDING PAGE</text>

  <!-- Right items -->
  <circle cx="420" cy="106" r="4" fill="#1e40af"/>
  <text x="432" y="110" font-size="11" fill="#1e293b">Problem-first headline</text>

  <circle cx="420" cy="130" r="4" fill="#1e40af"/>
  <text x="432" y="134" font-size="11" fill="#1e293b">Japan-relevant case studies</text>

  <circle cx="420" cy="154" r="4" fill="#1e40af"/>
  <text x="432" y="158" font-size="11" fill="#1e293b">Risk reduction framing</text>

  <circle cx="420" cy="178" r="4" fill="#1e40af"/>
  <text x="432" y="182" font-size="11" fill="#1e293b">Operational specifics</text>

  <circle cx="420" cy="202" r="4" fill="#1e40af"/>
  <text x="432" y="206" font-size="11" fill="#1e293b">Trust-building CTA: "Get a guide"</text>

  <circle cx="420" cy="226" r="4" fill="#1e40af"/>
  <text x="432" y="230" font-size="11" fill="#1e293b">Japan proof &amp; support structure</text>

  <circle cx="420" cy="250" r="4" fill="#1e40af"/>
  <text x="432" y="254" font-size="11" fill="#1e293b">FAQ addressing Japan concerns</text>

  <!-- VS circle -->
  <circle cx="380" cy="200" r="22" fill="#1e40af"/>
  <text x="380" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">vs</text>

  <!-- Caption bar -->
  <rect x="20" y="368" width="720" height="22" rx="4" fill="#eff6ff"/>
  <text x="380" y="383" text-anchor="middle" font-size="10" fill="#475569">Adapting for Japan means redesigning the argument structure, not just translating the words.</text>

