<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" role="img" aria-label="Japan-Ready Revenue Funnel Before Sales Hiring — two-row diagram showing 7 funnel stages and corresponding design elements">
  <title>Japan-Ready Revenue Funnel Before Sales Hiring</title>
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e40af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="210" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.07em" fill="#64748b">JAPAN-READY REVENUE FUNNEL BEFORE SALES HIRING</text>

  <!-- ══════════════════════════════
       TOP ROW: Funnel stages
       y=44, h=54, cy=71
       box width=82, gap=22
       ══════════════════════════════ -->

  <!-- Box 1: Awareness -->
  <rect x="27"  y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="68"  y="75" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Awareness</text>

  <!-- Arrow 1→2 -->
  <line x1="109" y1="71" x2="127" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Interest -->
  <rect x="129" y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="75" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Interest</text>

  <!-- Arrow 2→3 -->
  <line x1="211" y1="71" x2="229" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Lead -->
  <rect x="231" y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="272" y="75" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Lead</text>

  <!-- Arrow 3→4 -->
  <line x1="313" y1="71" x2="331" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: Qualified Lead -->
  <rect x="333" y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="374" y="66" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Qualified</text>
  <text x="374" y="80" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Lead</text>

  <!-- Arrow 4→5 -->
  <line x1="415" y1="71" x2="433" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 5: Sales Conversation -->
  <rect x="435" y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="476" y="66" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Sales</text>
  <text x="476" y="80" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Conversation</text>

  <!-- Arrow 5→6 -->
  <line x1="517" y1="71" x2="535" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 6: Opportunity -->
  <rect x="537" y="44" width="82" height="54" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="578" y="75" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e40af">Opportunity</text>

  <!-- Arrow 6→7 -->
  <line x1="619" y1="71" x2="637" y2="71" stroke="#1e40af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 7: Pipeline Visibility (outcome — filled dark) -->
  <rect x="639" y="44" width="94" height="54" rx="8" fill="#1e40af" stroke="#1e40af" stroke-width="1.5"/>
  <text x="686" y="66" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Pipeline</text>
  <text x="686" y="80" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Visibility</text>

  <!-- ══════════════════════════════
       VERTICAL CONNECTORS
       from box bottom (98) to design box top (112)
       ══════════════════════════════ -->
  <line x1="68"  y1="98" x2="68"  y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="170" y1="98" x2="170" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="272" y1="98" x2="272" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="374" y1="98" x2="374" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="476" y1="98" x2="476" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="578" y1="98" x2="578" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="686" y1="98" x2="686" y2="112" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- ══════════════════════════════
       BOTTOM ROW: Design elements
       y=112, h=30
       centered under each box
       ══════════════════════════════ -->

  <!-- Element 1: Positioning -->
  <rect x="27"  y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="68"  y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Positioning</text>

  <!-- Element 2: Trust signals -->
  <rect x="129" y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="170" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Trust signals</text>

  <!-- Element 3: CTA -->
  <rect x="231" y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="272" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">CTA</text>

  <!-- Element 4: Qualification -->
  <rect x="333" y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="374" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Qualification</text>

  <!-- Element 5: Follow-up -->
  <rect x="435" y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="476" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Follow-up</text>

  <!-- Element 6: CRM stages -->
  <rect x="537" y="112" width="82" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="578" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">CRM stages</text>

  <!-- Element 7: Reporting -->
  <rect x="639" y="112" width="94" height="30" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="686" y="131" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Reporting</text>

  <!-- ══════════════════════════════
       CAPTION BAR
       ══════════════════════════════ -->
  <rect x="27" y="154" width="706" height="40" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="170" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e40af">Sales hiring works better when the funnel, handoff rules,</text>
  <text x="380" y="186" text-anchor="middle" font-size="11.5" fill="#334155">and CRM structure are already defined.</text>
</svg>
